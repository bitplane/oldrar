name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
      - ".gitignore"

# Default to no permissions; the test job grants only read.
permissions: {}

# Cancel an in-progress run if a new commit lands on the same ref. PRs
# get cancelled and re-run on push; tag pushes are handled in release.yml.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Linux x86_64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets
